  <script>
    // Bullet-proof cache nuke on version mismatch (runs once per version)
    (function(){
      var V = "v36";
      try {
        if (localStorage.getItem("kedai.v") !== V) {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(rs){
              return Promise.all(rs.map(function(r){ return r.unregister(); }));
            }).then(function(){
              if (window.caches && caches.keys) {
                return caches.keys().then(function(ks){
                  return Promise.all(ks.map(function(k){ return caches.delete(k); }));
                });
              }
            }).then(function(){
              localStorage.setItem("kedai.v", V);
              location.reload();
            }).catch(function(){ try{ localStorage.setItem("kedai.v", V);}catch(e){} });
          } else {
            localStorage.setItem("kedai.v", V);
          }
        }
      } catch(e) {}
    })();
  </script>
